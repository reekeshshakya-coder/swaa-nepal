<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swaa Nepal</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

/* HEADER */
header {
    position: relative;
    height: 320px;
    color: white;
    text-align: center;
    overflow: hidden;
}

.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    animation: slideShow 15s infinite;
    opacity: 0;
}

.slide:nth-child(1) { animation-delay: 0s; }
.slide:nth-child(2) { animation-delay: 5s; }
.slide:nth-child(3) { animation-delay: 10s; }

@keyframes slideShow {
    0% {opacity:0;}
    5% {opacity:1;}
    30% {opacity:1;}
    35% {opacity:0;}
    100% {opacity:0;}
}

.header-content {
    position: relative;
    z-index: 2;
    background: rgba(0,0,0,0.5);
    height: 100%;
    padding-top: 40px;
}

.logo {
    width: 90px;
    border-radius: 50%;
    background: white;
    padding: 8px;
}

/* GRID */
.container { padding: 20px; }

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    transition: transform 0.4s;
    cursor: pointer;
}

.card:hover img {
    transform: scale(1.08);
}

.card-content { padding: 15px; }

button {
    width: 100%;
    padding: 10px;
    background: #2d6a4f;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

/* FOOTER */
.footer {
    background: #1b4332;
    color: white;
    text-align: center;
    padding: 20px;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
}

.modal-content {
    background: white;
    margin: 8% auto;
    padding: 20px;
    border-radius: 10px;
    width: 350px;
    position: relative;
}

.close {
    position: absolute;
    right: 15px;
    top: 10px;
    font-size: 22px;
    cursor: pointer;
}

.plant-info {
    background: #e9f5ee;
    padding: 10px;
    border-radius: 6px;
}

/* IMAGE POPUP */
.image-popup {
    display: none;
    position: fixed;
    z-index: 2000;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
}

.image-popup img {
    max-width: 80%;
    max-height: 80%;
    display: block;
    margin: 5% auto;
    border-radius: 10px;
}

.image-popup span {
    position: absolute;
    top: 20px;
    right: 40px;
    font-size: 30px;
    color: white;
    cursor: pointer;
}

/* WHATSAPP FLOAT BUTTON */
.whatsapp-chat {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

.whatsapp-chat img {
    width: 28px;
}

</style>
</head>

<body>

<!-- HEADER -->
<header>
    <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1501004318641-b39e6451bec6')"></div>
    <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1466692476868-aef1dfb1e735')"></div>
    <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1502741338009-cac2772e18bc')"></div>

    <div class="header-content">
        <img src="logo.png" class="logo">
        <h1>Swaa Nepal</h1>
        <p>Let’s Grow Something Beautiful Together 🌱</p>
    </div>
</header>

<!-- CHECKOUT MODAL -->
<div id="checkoutModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2>Checkout</h2>

        <div class="plant-info">
            <p id="plant"></p>
        </div>

        <input type="text" id="name" placeholder="Enter your name">
        <input type="text" id="phone" placeholder="Enter mobile number">

        <select id="payment">
            <option value="">Select Payment Mode</option>
            <option>Cash on Delivery</option>
            <option>eSewa</option>
            <option>Khalti</option>
        </select>

        <input type="number" id="amount">

        <button onclick="placeOrder()">Pay & Order</button>
    </div>
</div>

<!-- IMAGE POPUP -->
<div id="imgPopup" class="image-popup" onclick="closeImage()">
    <span>&times;</span>
    <img id="popupImg">
</div>

<!-- CONTENT -->
<div class="container">
<input type="text" id="search" placeholder="Search plants..." onkeyup="searchPlant()">
<div class="grid" id="plants"></div>
</div>

<!-- FOOTER -->
<div class="footer">
    <h3>Contact Information</h3>
    <p>Name: Sunil Shahi</p>
    <p>Email: suhil.shahi3@gmail.com</p>
    <p>Address: Nayabazar, Kathmandu</p>

    <button onclick="openMap()">📍 View Location</button>

    <iframe
        src="https://www.google.com/maps?q=27.723015149068242,85.3041695460239&output=embed"
        width="100%" height="200" style="border-radius:10px;">
    </iframe>
</div>

<!-- WHATSAPP BUTTON -->
<div class="whatsapp-chat" onclick="openWhatsApp()">
    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</div>

<script>
const plantList = [
    { name: 'Monstera', price: 500, img: 'https://plantersplace.com/wp-content/uploads/2022/08/20200309_110255-300x300.jpg' },
    { name: 'Aloe Vera', price: 500, img: 'https://www.almanac.com/sites/default/files/styles/or/public/image_nodes/aloe-vera-white-pot_sunwand24-ss_edit_0.jpg' },
    { name: 'Snake Plant', price: 800, img: 'https://therubyplants.com.au/wp-content/uploads/2024/06/Snake-Plant-Superba-Sansevieria-Trifasciata-20cm-pot-1181x2048.jpg' },
    { name: 'Peace Lily', price: 700, img: 'https://flowersinnepal.com/storage/7/conversions/peace-lilly-medium.webp' },
    { name: 'Fiddle Leaf Fig', price: 200, img: 'https://gardenbetty.com/wp-content/uploads/2024/04/ficus-lyrata-fiddle-leaf-fig-01.jpg.webp' },
    { name: 'Rubber Plant', price: 800, img: 'https://cdn.ecommercedns.uk/files/2/233342/6/13004296/img-1452.jpg' },
    { name: 'Cactus', price: 400, img: 'https://images.unsplash.com/photo-1501004318641-b39e6451bec6' },
    { name: 'Bonsai', price: 300, img: 'https://bonsaimary.com/wp-content/uploads/2023/11/Japanese-Maple-Bonsai-Acer-palmatum11.webp' },
    { name: 'Fern', price: 700, img: 'https://th.bing.com/th/id/R.2fbcc64f6c7cd2b8ead060f65399261a?rik=yuvEimA2JfmnCw&pid=ImgRaw&r=0' }
];

const container = document.getElementById('plants');

plantList.forEach(p => {
    container.innerHTML += `
    <div class="card">
        <img src="${p.img}" onclick="openImage('${p.img}')">
        <div class="card-content">
            <h3>${p.name}</h3>
            <p>NPR ${p.price}</p>
            <button onclick="buyNow('${p.name}',${p.price})">Add to Cart</button>
        </div>
    </div>`;
});

let selectedPlant = {};

function buyNow(name, price) {
    selectedPlant = { name, price };
    document.getElementById('plant').innerText = name + ' - NPR ' + price;
    document.getElementById('amount').value = price;
    document.getElementById('checkoutModal').style.display = 'block';
}

function closeModal() {
    document.getElementById('checkoutModal').style.display = 'none';
}

function placeOrder() {
    let name = document.getElementById('name').value;
    let phone = document.getElementById('phone').value;
    let payment = document.getElementById('payment').value;
    let amount = document.getElementById('amount').value;

    if (!name || !phone || !payment || !amount) {
        alert("Please fill all details");
        return;
    }

    let msg = `Order:%0APlant:${selectedPlant.name}%0AAmount:NPR ${amount}%0APayment:${payment}%0AName:${name}%0APhone:${phone}`;
    window.open(`https://wa.me/9779843365880?text=${msg}`);
    closeModal();
}

function searchPlant() {
    let input = document.getElementById('search').value.toLowerCase();
    let cards = document.getElementsByClassName('card');
    for (let i = 0; i < cards.length; i++) {
        cards[i].style.display =
            cards[i].innerText.toLowerCase().includes(input) ? '' : 'none';
    }
}

/* IMAGE POPUP */
function openImage(src) {
    document.getElementById('imgPopup').style.display = 'block';
    document.getElementById('popupImg').src = src;
}
function closeImage() {
    document.getElementById('imgPopup').style.display = 'none';
}

/* MAP */
function openMap() {
    window.open("https://www.google.com/maps?q=27.723015149068242,85.3041695460239");
}

/* WHATSAPP */
function openWhatsApp() {
    let msg = "Hello Swaa Nepal! I want to know about plants 🌱";
    window.open(`https://wa.me/9779843365880?text=${encodeURIComponent(msg)}`);
}
</script>

</body>
</html>
